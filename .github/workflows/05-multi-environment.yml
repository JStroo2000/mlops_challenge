name: Train model

on:
  push:
    branches: [ main ]

jobs:
  buildDev:
    runs-on: ubuntu-latest
    environment:
        name: dev 
    steps:
    - name: Check out repo
      uses: actions/checkout@main
    - name: Install az ml extension
      run: az extension add -n ml -y
    - name: Azure login
      uses: azure/login@v1
      with:
        creds: ${{secrets.AZURE_CREDENTIALS}}
    - name: Submit ML job
      run: az ml job create --file src/job.yml --resource-group diabetes-dev-rg --workspace-name aml-diabetes-dev --stream
  buildProd:
    runs-on: ubuntu-latest
    environment:
        name: prod
    needs: [ buildDev ]
    steps:
    - name: Check out repo
      uses: actions/checkout@main
    - name: Install az ml extension
      run: az extension add -n ml -y
    - name: Azure login
      uses: azure/login@v1
      with:
        creds: ${{secrets.AZURE_CREDENTIALS}}
    - name: Submit ML job
      run: az ml job create --file src/prod_job.yml --resource-group diabetes-dev-rg --workspace-name aml-diabetes-dev --stream